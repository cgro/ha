#https://forum.fhem.de/index.php?topic=59448.0
##############################################################
# KNX device definitions
# Naming: {TYPE}_{FLOOR}_{ROOM}
#   LGT = Light, SHU = Shutter, SCN = Scene, PWR = Power socket
#   F0 = UG (basement), F1 = EG (ground floor), F2 = OG (upper floor)
#
# KNX group address structure:
#   1/0/y = light switch cmd          1/4/y = light status feedback
#   2/0/y = shutter move              2/1/y = shutter stop
#   2/2/y = shutter position set      2/4/y = shutter end-position up (actuator feedback)
#   2/5/y = shutter end-position down 2/6/y = shutter position status feedback
#   Sub-address y: 1–99 = EG, 100–199 = OG, 200–299 = UG
#
# DPT (Data Point Type) — encoding of the KNX telegram value:
#   dpt1     = 1-bit on/off       (0 = off/up, 1 = on/down)
#   dpt1.008 = 1-bit direction    (0 = up, 1 = down)
#   dpt5.001 = 8-bit position     (0 = fully open/up, 100 = fully closed/down)
#
# Full shutter GA layout (6 GAs per individual shutter device):
#   pos-set(2/2/y) | move(2/0/y) | stop(2/1/y) | end-up(2/4/y) | end-dn(2/5/y) | pos-status(2/6/y)
#   g1             | g2          | g3           | g4             | g5             | g6
##############################################################

##############################################################
# Zentral / System-wide
##############################################################

# Away mode flag — shared state for all four automations in scene_config.cfg
# on = left home (away), off = at home (default)
define SCN_Away KNX 5/0/000:dpt1 5/4/000:dpt1
attr SCN_Away IODev tul
attr SCN_Away alias Away
attr SCN_Away group Central_Functions
attr SCN_Away room 3_Zentral
attr SCN_Away webCmd on:off

##############################################################
# F0 — UG (Untergeschoss / Basement)
##############################################################

# Central basement shutter control — broadcasts move/stop to all UG shutters simultaneously
# Move-only: no position feedback on this GA; use individual SHU_F0_* for precise positioning
define SHU_F0_all KNX 2/0/200:dpt1.008 2/1/200:dpt1.008
attr SHU_F0_all IODev tul
attr SHU_F0_all alias Shutter UG
attr SHU_F0_all eventMap /g1 off:Up/g2 on:Stop/g1 on:Down
attr SHU_F0_all group Central_Functions
attr SHU_F0_all room 0_UG
attr SHU_F0_all webCmd Up:Stop:Down

