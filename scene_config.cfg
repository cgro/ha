##############################################################
# FHEM scene and automation configuration
#
# Four automations:
#   training          — 09:25, at-home only: daily routine marker
#   automation_morn   — 09:30, away only:    morning shutter sequence (2 phases)
#   automation_eve    — sunset, away only:   presence simulation (lights + shutters)
#   always_on_eve     — sunset, at-home:     close shutters 25 min after sunset
##############################################################

# ---- Morning automation — away mode -------------------------
# Phase 1 (immediate): open shutters to simulate waking up
# Phase 2 (+3h):       re-position for afternoon sun

define training at *09:25 {\
	if ((ReadingsVal("SCN_Away", "state", "off")) eq "off") {\
		{Log 3, "automation-LOG: training active."}\
	} else {\
		{Log 3, "automation-LOG: training inactive."}\
	}\
}

define automation_morn at *09:30 {\
	if ((ReadingsVal("SCN_Away", "state", "off")) eq "on") {\
		{Log 3, "automation-LOG: morn active."}\
		{fhem("define e1 at +00:00:00 set SHU_F2_hall g1 50")}\
		{fhem("define e2 at +00:00:02 set SHU_F2_bedroom g1 50")}\
		{fhem("define e3 at +00:00:04 set SHU_F2_bathroom g1 80")}\
		{fhem("define e4 at +00:00:06 set SHU_F2_hannah g1 80")}\
		{fhem("define e5 at +00:00:08 set SHU_F2_nicolas g1 50")}\
		{fhem("define e6 at +00:00:10 set SHU_F1_office g1 0")}\
		{fhem("define e7 at +00:00:12 set SHU_F1_wc g1 0")}\
		{fhem("define e8 at +00:00:14 set SHU_F1_kitchen_window g1 90")}\
		{fhem("define e9 at +00:00:16 set SHU_F1_kitchen_door g1 0")}\
		{fhem("define e10 at +00:00:18 set SHU_F1_diningroom g1 0")}\
		{fhem("define e11 at +00:00:20 set SHU_F1_livingroom g1 0")}\
		{fhem("define e12 at +03:01:00 set SHU_F2_hall g1 80")}\
		{fhem("define e13 at +03:01:02 set SHU_F2_bedroom g1 80")}\
		{fhem("define e14 at +03:01:04 set SHU_F2_bathroom g1 50")}\
		{fhem("define e15 at +03:01:06 set SHU_F2_hannah g1 50")}\
		{fhem("define e16 at +03:01:08 set SHU_F2_nicolas g1 80")}\
		{fhem("define e17 at +03:01:16 set SHU_F1_kitchen_door g1 80")}\
		{fhem("define e18 at +03:01:18 set SHU_F1_diningroom g1 80")}\
		{fhem("define e19 at +03:01:20 set SHU_F1_livingroom g1 80")}\
	} else {\
		{Log 3, "automation-LOG: morn inactive."}\
	}\
}

# ---- Evening automation — away mode -------------------------
# At sunset:    kitchen_window 90%, cellar shutters close
# +1 min:       kitchen and dining lights on
# +5 min:       hannah light on
# +25 min:      kitchen window fully closed, EG shutters to 90%
# +30 min:      kitchen and dining lights off
# +40 min:      bathroom light on
# +1h:          all shutters fully closed, OG shutters close
# +1h03:        hannah and bathroom lights off

define automation_eve at *{sunset("REAL")} {\
	if ((ReadingsVal("SCN_Away", "state", "off")) eq "on") {\
		{Log 3, "automation-LOG: eve active."}\
		{fhem("define m1 at +00:00:14 set SHU_F1_kitchen_window g1 90")}\
		{fhem("define m2 at +00:00:24 set SHU_F0_C1 g1 100")}\
		{fhem("define m3 at +00:00:26 set SHU_F0_C3 g1 100")}\
		{fhem("define m4 at +00:01:41 set LGT_F1_kitchen on")}\
		{fhem("define m5 at +00:02:42 set LGT_F1_diningroom on")}\
		{fhem("define m6 at +00:05:31 set LGT_F2_hannah on")}\
		{fhem("define m7 at +00:30:40 set LGT_F1_kitchen off")}\
		{fhem("define m8 at +00:30:46 set LGT_F1_diningroom off")}\
		{fhem("define m9 at +00:40:33 set LGT_F2_bathroom on")}\
		{fhem("define m10 at +01:01:00 set SHU_F2_hall g1 100")}\
		{fhem("define m11 at +01:01:02 set SHU_F2_bedroom g1 100")}\
		{fhem("define m12 at +01:01:04 set SHU_F2_bathroom g1 100")}\
		{fhem("define m13 at +01:01:06 set SHU_F2_hannah g1 100")}\
		{fhem("define m14 at +01:01:08 set SHU_F2_nicolas g1 100")}\
		{fhem("define m15 at +01:01:10 set SHU_F1_office g1 100")}\
		{fhem("define m16 at +01:01:12 set SHU_F1_wc g1 100")}\
		{fhem("define m17 at +01:01:14 set SHU_F1_kitchen_window g1 100")}\
		{fhem("define m18 at +01:01:16 set SHU_F1_kitchen_door g1 100")}\
		{fhem("define m19 at +01:01:18 set SHU_F1_diningroom g1 100")}\
		{fhem("define m20 at +01:01:20 set SHU_F1_livingroom g1 100")}\
		{fhem("define m21 at +01:03:36 set LGT_F2_hannah off")}\
		{fhem("define m22 at +01:10:38 set LGT_F2_bathroom off")}\
	} else {\
		{Log 3, "automation-LOG: eve inactive."}\
	}\
}

# ---- Evening automation — at-home mode ----------------------
# Close shutters 25 min after sunset when someone is home

define always_on_automation_eve at *{sunset("REAL")} {\
	if ((ReadingsVal("SCN_Away", "state", "off")) eq "off") {\
		{Log 3, "automation-LOG: always_on eve active."}\
		{fhem("define a1 at +00:25:00 set SHU_F2_hall g1 100")}\
		{fhem("define a2 at +00:25:14 set SHU_F1_kitchen_window g1 100")}\
		{fhem("define a3 at +00:25:16 set SHU_F1_kitchen_door g1 100")}\
		{fhem("define a4 at +00:25:18 set SHU_F1_diningroom g1 100")}\
		{fhem("define a5 at +00:25:20 set SHU_F1_livingroom g1 100")}\
		{fhem("define a6 at +00:25:21 set SHU_F0_C1 g1 100")}\
		{fhem("define a7 at +00:25:22 set SHU_F0_C3 g1 100")}\
	} else {\
		{Log 3, "automation-LOG: always_on eve inactive."}\
	}\
}
